# Perfil default — H2 fichero persistente, CERO dependencias externas.
# Es la configuración con la que arranca el backend si no se indica perfil:
# ideal para la defensa (no depende de Docker ni de Oracle).
# Datos persistentes entre reinicios en 01_BACKEND_JAVA/data/novarift.mv.db
#
# Oracle sigue disponible como perfil opcional:
# SPRING_PROFILES_ACTIVE=oracle (o launcher con -DbProfile oracle)
spring.datasource.url=jdbc:h2:file:./data/novarift;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# update: preserva datos existentes entre reinicios, solo añade columnas nuevas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# Seed KB: corre tras crear el esquema; INSERTs duplicados se ignoran en
# arranques posteriores (ver comentario en application.properties).
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Consola H2: http://localhost:8080/h2-console (jdbc:h2:file:./data/novarift · sa · vacía)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.riot.mode=${APP_RIOT_MODE:MOCK}
