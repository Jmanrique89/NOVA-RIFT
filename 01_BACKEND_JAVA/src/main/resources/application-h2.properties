# Perfil H2 — alias explícito del default (H2 ya es el perfil por defecto).
# Misma configuración que el perfil por defecto.
# Uso (PowerShell): $env:SPRING_PROFILES_ACTIVE="h2"; mvn spring-boot:run
# Los datos sobreviven reinicios en 01_BACKEND_JAVA/data/novarift.mv.db
spring.datasource.url=jdbc:h2:file:./data/novarift;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# Seed KB: corre tras crear el esquema; INSERTs duplicados se ignoran en
# arranques posteriores (ver comentario en application.properties).
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Consola H2 para inspeccionar la BD en el navegador: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:file:./data/novarift · user: sa · password: (vacía)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
