# Perfil oracle — OPCIONAL. Oracle XE en Docker, datos persistentes.
# Requisito: Docker Desktop corriendo + contenedor novarift-oracle activo
# Arrancar BD: docker-compose -f 03_INFRASTRUCTURE/docker-compose.yml up -d
# Activar: SPRING_PROFILES_ACTIVE=oracle mvn spring-boot:run
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=novarift
spring.datasource.password=novarift
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# update: preserva datos existentes entre reinicios, solo añade columnas nuevas
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# Oracle persiste los datos entre reinicios — el seed solo corre una vez
# PRIMERA VEZ (BD vacía): cambiar temporalmente a 'always', arrancar, volver a 'never'
# Para re-sembrar: TRUNCATE TABLE KB_CHAMPIONS; KB_ITEM_COUNTERS; KB_THREAT_RULES;
# OJO: este perfil usa data-oracle.sql (no data.sql): Oracle no soporta
# INSERT multifila VALUES (..),(..) ni literales TRUE/FALSE (07-06).
spring.jpa.defer-datasource-initialization=true
spring.sql.init.data-locations=classpath:data-oracle.sql
spring.sql.init.mode=never

# Sin consola H2 en este perfil
spring.h2.console.enabled=false
