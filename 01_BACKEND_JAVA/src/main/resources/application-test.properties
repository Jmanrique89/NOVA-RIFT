spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Knowledge Base seed - cargar data.sql tras crear esquema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

app.riot.mode=MOCK
app.riot.api-key=TEST-KEY
app.riot.url.account=http://127.0.0.1:1/mock
app.riot.url.spectator=http://127.0.0.1:1/mock
riot.api.key=TEST-KEY

# P2 — Rate limit deshabilitado en perfil test para que los tests de
# integración puedan hacer múltiples requests al mismo endpoint sin
# golpear el bucket. El RateLimitFilterTest unit-test se valida con
# ReflectionTestUtils, no con este perfil.
app.rate-limit.enabled=false
