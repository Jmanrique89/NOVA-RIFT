spring.application.name=Nova Rift EloForge
server.port=8080

# ─── P1 · Spring Boot Actuator + Prometheus ──────────────────────────────────
# Endpoints expuestos:
# GET /actuator/health — health check (UP|DOWN + componentes)
# GET /actuator/info — info de la app (build version, etc.)
# GET /actuator/metrics — listado de métricas Micrometer
# GET /actuator/prometheus — métricas en formato Prometheus para scrape
#
# Por seguridad, en producción se debería proteger el endpoint /actuator/* con
# auth básica + IP whitelist. Para el TFG dejamos abierto al ser red local.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# Nombre de la app que aparece en `info.app.name` del endpoint /actuator/info
management.info.env.enabled=true
info.app.name=Nova Rift EloForge
info.app.version=@project.version@
info.app.description=League of Legends companion app — TFG 2026

# ─── P2 · Rate limiting (Bucket4j) ────────────────────────────────────────────
# Token bucket por IP en endpoints públicos (/api/v1/riot, /api/v1/coaching).
# Default 60 req/min/IP. Para deshabilitar en dev: app.rate-limit.enabled=false
app.rate-limit.enabled=true
app.rate-limit.capacity=60
app.rate-limit.refill-tokens=60
app.rate-limit.refill-period-seconds=60

# ─── Database ──────────────────────────────────────────────────────────
# DEFAULT = H2 fichero persistente: cero dependencias externas (sin Docker).
# Los datos sobreviven reinicios en ./data/novarift.mv.db.
# Oracle queda como perfil OPCIONAL: SPRING_PROFILES_ACTIVE=oracle
# (ver perfil en application-oracle.properties).
spring.datasource.url=jdbc:h2:file:./data/novarift;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Seed de la Knowledge Base (data.sql) en cada arranque:
# defer: data.sql corre DESPUÉS de que Hibernate cree/actualice el esquema.
# always + continue-on-error: en BD ya sembrada los INSERT duplicados se
# ignoran (PK violation) y el arranque continúa. Idempotencia pragmática
# para demo/TFG; en producción se usaría Flyway/Liquibase.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Consola H2 para inspección: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:file:./data/novarift · user: sa · password: (vacía)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MOCK MODE CONFIGURATION
# Options: MOCK, REAL
# Sobrescribir con variable de entorno APP_RIOT_MODE=MOCK para modo sin clave.
app.riot.mode=${APP_RIOT_MODE:REAL}

# OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html

# Riot API Configuration
# IMPORTANT: never commit real API keys in repository.
#
# Como cargarla:
# 1. Variable de entorno RIOT_API_KEY (recomendado para dev local)
# → ej: $env:RIOT_API_KEY="RGAPI-xxx" antes de mvn spring-boot:run
# 2. Propiedad del sistema -Dapp.riot.api-key=RGAPI-xxx al arrancar
# 3. (Producción) servicio de secrets / vault — NO hardcodear aquí
#
# El placeholder "RGAPI-DEMO-KEY-PLACEHOLDER" hace que las llamadas REAL
# devuelvan 401/403 → el adapter cae a fallback. Para demo sin red usa
# el flujo MOCK del frontend (botón DEMO en el login).
#
# la clave también puede fijarse desde el panel ADMIN (persistida en BD,
# tabla APP_CONFIG). Prioridad efectiva: BD > variable de entorno > properties.
app.riot.api-key=${RIOT_API_KEY:RGAPI-DEMO-KEY-PLACEHOLDER}
app.riot.url.account=https://europe.api.riotgames.com/riot/account/v1
app.riot.url.spectator=https://euw1.api.riotgames.com/lol/spectator/v5

# ─── Email de bienvenida (puerto EmailNotificationPort) ──────────────────────
# Mismo patron que app.riot.mode (MOCK/REAL): dos adaptadores del mismo puerto.
# Options: LOG, SMTP
#   LOG  → LogEmailNotificationAdapter: escribe el email en el log, sin SMTP.
#          Es el modo DEMO/TFG por defecto (no falla, no requiere red).
#   SMTP → SmtpEmailNotificationAdapter: envio real con JavaMailSender.
# Sobrescribir con variable de entorno: APP_EMAIL_MODE=SMTP
app.email.mode=${APP_EMAIL_MODE:LOG}
# Remitente de los correos (solo aplica en modo SMTP).
app.email.from=${MAIL_FROM:no-reply@novarift.local}
#
# Para activar el envio REAL (modo SMTP), pon app.email.mode=SMTP y descomenta el
# bloque siguiente. NUNCA commitear credenciales: se leen de variables de entorno.
# Ejemplo (Gmail con app-password):
#   $env:MAIL_HOST="smtp.gmail.com"; $env:MAIL_USER="tucuenta@gmail.com"; $env:MAIL_PASSWORD="app-password"
#spring.mail.host=${MAIL_HOST:}
#spring.mail.port=${MAIL_PORT:587}
#spring.mail.username=${MAIL_USER:}
#spring.mail.password=${MAIL_PASSWORD:}
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true

# ─── JWT Auth ──────────────────────────────────────────────────
# Secret HMAC SHA-256: cualquier string de >= 32 chars sirve. NO commitear el real.
# En producción: leer de variable de entorno (-Dapp.jwt.secret=...).
app.jwt.secret=${JWT_SECRET:novarift_super_secret_2026_minimum_32_chars_xx}
# TTL token = 30 días (TFG, no producción)
app.jwt.ttl-days=30
